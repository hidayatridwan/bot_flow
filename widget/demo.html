<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Umbrella Support — widget demo</title>
</head>

<body style="font-family:system-ui;padding:40px;max-width:640px;margin:auto">
    <h1>Umbrella Support</h1>
    <p>This page simulates a customer's website embedding the chat widget. The publishable
        key below is safe to expose — it's chat-only and locked to this origin.</p>
    <!-- Bump the version query whenever the widget changes: browsers cache an unversioned
         script aggressively, so visitors keep running a stale copy long after a fix ships. -->
    <script src="widget.js?v=2"></script>
    <script>
        ChatWidget.init({
            apiBase: 'http://localhost:3000',
            // A publishable key: chat-only, and rejected from any Origin not on its allow-list.
            // Mint your own at http://localhost:5173/keys — the dashboard writes the whole snippet
            // for you. By hand: POST /auth/keys with a `sess_` token and
            //   {"kind":"publishable","allowed_origins":["http://localhost:5500"]}
            // A 401 here means this key's hash is not in the database (wrong or recreated DB).
            // A 403 means this page's Origin is not on the key's allow-list — mind the port.
            publicKey: 'pk_cb1c812075f142178c288951131f66da3089832d4b314806b89a5a42aa24fd0f'
        });
    </script>
</body>

</html>
