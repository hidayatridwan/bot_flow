services:
  postgres:
    image: postgres:16-alpine
    container_name: bot_flow-postgres
    environment:
      POSTGRES_USER: bot_flow
      POSTGRES_PASSWORD: bot_flow
      POSTGRES_DB: bot_flow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot_flow -d bot_flow"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.18.0
    container_name: bot_flow-qdrant
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    ports:
      - "6333:6333"   # REST + dashboard
      - "6334:6334"   # gRPC (used by qdrant-client)
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    image: minio/minio:latest
    container_name: bot_flow-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345     # MinIO requires >= 8 chars
      # Publish ObjectCreated events straight to RabbitMQ. The client uploads directly to MinIO,
      # so this — not a client callback — is what tells the worker a document has arrived.
      MINIO_NOTIFY_AMQP_ENABLE_PRIMARY: "on"
      MINIO_NOTIFY_AMQP_URL_PRIMARY: "amqp://bot_flow:bot_flow@rabbitmq:5672"
      MINIO_NOTIFY_AMQP_EXCHANGE_PRIMARY: "minio.events"
      MINIO_NOTIFY_AMQP_EXCHANGE_TYPE_PRIMARY: "direct"
      MINIO_NOTIFY_AMQP_ROUTING_KEY_PRIMARY: "document.uploaded"
      MINIO_NOTIFY_AMQP_DURABLE_PRIMARY: "on"
      MINIO_NOTIFY_AMQP_DELIVERY_MODE_PRIMARY: "2"      # persistent messages
      MINIO_NOTIFY_AMQP_MANDATORY_PRIMARY: "on"         # unroutable => returned + logged, not dropped
      MINIO_NOTIFY_AMQP_PUBLISHING_CONFIRMS_PRIMARY: "on"
      # The single most important setting here: while RabbitMQ is down, events are persisted to
      # disk and replayed on reconnect. Without it they are lost silently and the document sits
      # at `uploading` until the reaper expires it.
      MINIO_NOTIFY_AMQP_QUEUE_DIR_PRIMARY: "/data/.notify-queue"
      MINIO_NOTIFY_AMQP_QUEUE_LIMIT_PRIMARY: "100000"
    ports:
      - "9000:9000"     # S3 API — also where clients PUT presigned uploads
      - "9001:9001"     # web console (browser)
    volumes:
      - minio_data:/data
    depends_on:
      rabbitmq: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Binds the bucket to the AMQP target. Separate from the API's `ensure_bucket` because the
  # binding must exist before events start flowing, and because `mc` is only in the MinIO image.
  # `--event put` is mc's alias for `s3:ObjectCreated:*` — it already covers
  # CompleteMultipartUpload, which is the only event a >64MB multipart upload fires.
  minio-init:
    image: minio/minio:latest
    container_name: bot_flow-minio-init
    depends_on:
      minio: { condition: service_healthy }
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minio minio12345 &&
      mc mb --ignore-existing local/documents &&
      (mc event add local/documents arn:minio:sqs::PRIMARY:amqp --event put || true) &&
      mc event ls local/documents &&
      echo 'bucket notifications bound' "
    restart: "no"

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: bot_flow-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: bot_flow
      RABBITMQ_DEFAULT_PASS: bot_flow
    ports:
      - "5672:5672"     # AMQP (used by the app/worker)
      - "15672:15672"   # management UI (browser)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: bot_flow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  # A local SMTP sink. Password reset is the first feature here that sends mail, and a reset link is
  # a live credential — so development must not point at a real relay that could deliver one to a
  # real inbox. Mailpit accepts everything, delivers nothing, and shows it in a browser.
  mailpit:
    image: axllent/mailpit:latest
    container_name: bot_flow-mailpit
    ports:
      - "1025:1025" # SMTP — this is what SMTP_URL points at
      - "8025:8025" # web UI (browser): read the reset emails here
    volumes:
      - mailpit_data:/data
    environment:
      # Persist across restarts, so a reset link written before a restart is still readable.
      MP_DATABASE: /data/mailpit.db
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 10s
      timeout: 5s
      retries: 5
  # The dashboard, behind an opt-in profile.
  #
  # **`docker compose up -d` must keep starting only the backing services**, because that is the
  # documented dev loop: the binaries and `bun run dev` run on the host for fast rebuilds. A plain
  # service here would rebuild the app on every `up` and shadow `bun run dev` on another port.
  #
  # It exists at all so the production image is exercised by something. A Dockerfile nobody builds
  # is a Dockerfile that has already rotted — this repo went a long time with no web deploy path at
  # all precisely because nothing ever asked for one.
  #
  #   docker compose --profile full up -d --build web
  web:
    profiles: ["full"]
    build:
      context: ./web
    container_name: bot_flow-web
    ports:
      - "5173:3000" # 5173 outside to match `bun run dev`; adapter-node listens on 3000 inside
    environment:
      # `host.docker.internal`: the API runs on the *host*, not in this network.
      API_BASE_URL: http://host.docker.internal:3000
      # Required in production builds — without it, adapter-node infers the origin from the request
      # and every form post 403s behind a proxy. Here it simply names where the browser reaches us.
      ORIGIN: http://localhost:5173
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
  qdrant_data:
  minio_data:
  rabbitmq_data:
  redis_data:
  mailpit_data: